[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf

; Baud rate must match CONFIG_ESP_CONSOLE_UART_BAUDRATE in sdkconfig.defaults (115200).
; XIAO ESP32-S3 routes the console through USB JTAG/CDC (baud-rate independent),
; so this value only matters when using a UART-to-USB bridge.
monitor_speed = 115200

; esp32_exception_decoder: symbolises crash addresses to source file + line.
; direct: no newline stripping, preserves raw ESP-IDF log format.
monitor_filters = esp32_exception_decoder, direct

upload_speed = 921600

build_flags =
    -DFFT_MIC_N=1024
    -DFFT_IMU_N=2048
    -DSPEC_AVG_N=4
    ; Workaround for GCC 14.2.0 ICE in IRA pass on Windows (esp_lcd_panel_rgb.c).
    ; Disables loop-pressure analysis in the register allocator — no effect on
    ; our DSP code (which uses SIMD intrinsics, not auto-vectorisation via IRA).
    -fno-ira-loop-pressure
